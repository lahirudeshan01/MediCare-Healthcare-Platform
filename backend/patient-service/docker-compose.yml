version: '3.8'

services:
  patient-service:
    build: .
    container_name: patient-service
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://patient-mongodb:27017/patient_db
    volumes:
      - ./uploads:/usr/src/app/uploads
    depends_on:
      - patient-mongodb
    networks:
      - patient-network

  patient-mongodb:
    image: mongo:latest
    container_name: patient-mongodb
    ports:
      - "27017:27017" # Exposed to host if needed, optional
    volumes:
      - patient-mongo-data:/data/db
    networks:
      - patient-network

volumes:
  patient-mongo-data:

networks:
  patient-network:
    driver: bridge
