version: '3.8'

services:
  api-gateway:
    build: ./api-gateway
    container_name: medicare-api-gateway
    ports:
      - '3000:3000'
    env_file:
      - ./api-gateway/.env
    depends_on:
      - auth-service
      - ai-symptom-service
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 15s
      timeout: 5s
      retries: 3

  auth-service:
    build: ./auth-service
    container_name: medicare-auth-service
    ports:
      - '3001:3001'
    env_file:
      - ./auth-service/.env
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/health']
      interval: 15s
      timeout: 5s
      retries: 3

  ai-symptom-service:
    build: ./ai-symptom-service
    container_name: medicare-ai-symptom-service
    ports:
      - '3002:3002'
    env_file:
      - ./ai-symptom-service/.env
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3002/health']
      interval: 15s
      timeout: 5s
      retries: 3
