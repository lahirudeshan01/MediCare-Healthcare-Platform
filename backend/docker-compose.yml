version: '3.9'
services:
  doctor-service:
    build: ./doctor-service
    container_name: doctor-service
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - DB_PATH=/app/data/doctor-service.db
    volumes:
      - doctor_data:/app/data

  telemedicine-service:
    build: ./telemedicine-service
    container_name: telemedicine-service
    ports:
      - "8085:8085"
    environment:
      - PORT=8085
      - DB_PATH=/app/data/telemedicine-service.db
      - JITSI_BASE_URL=https://meet.jit.si
    volumes:
      - telemedicine_data:/app/data

volumes:
  doctor_data:
  telemedicine_data:
