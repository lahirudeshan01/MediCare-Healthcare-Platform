version: '3.8'

# This compose file is for backend-only local development.
# For the full stack (including frontend), use the root docker-compose.yml.

services:

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: medicare-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medicare-network

  api-gateway:
    build: ./api-gateway
    container_name: medicare-api-gateway
    ports:
      - '3000:3000'
    env_file:
      - ./api-gateway/.env
    environment:
      - AUTH_SERVICE_URL=http://auth-service:3001
      - AI_SYMPTOM_SERVICE_URL=http://ai-symptom-service:3002
      - APPOINTMENT_SERVICE_URL=http://appointment-service:3003
      - PAYMENT_SERVICE_URL=http://payment-service:3004
      - NOTIFICATION_SERVICE_URL=http://notification-service:3005
      - DOCTOR_SERVICE_URL=http://doctor-service:8082
      - TELEMEDICINE_SERVICE_URL=http://telemedicine-service:8085
    depends_on:
      - auth-service
      - ai-symptom-service
      - appointment-service
      - payment-service
      - notification-service
      - doctor-service
      - telemedicine-service
    networks:
      - medicare-network

  auth-service:
    build: ./auth-service
    container_name: medicare-auth-service
    ports:
      - '3001:3001'
    env_file:
      - ./auth-service/.env
    networks:
      - medicare-network

  ai-symptom-service:
    build: ./ai-symptom-service
    container_name: medicare-ai-symptom-service
    ports:
      - '3002:3002'
    env_file:
      - ./ai-symptom-service/.env
    networks:
      - medicare-network

  appointment-service:
    build: ./appointment-service
    container_name: medicare-appointment-service
    ports:
      - '3003:3003'
    env_file:
      - ./appointment-service/.env
    environment:
      - NOTIFICATION_SERVICE_URL=http://notification-service:3005
    depends_on:
      - notification-service
    networks:
      - medicare-network

  payment-service:
    build: ./payment-service
    container_name: medicare-payment-service
    ports:
      - '3004:3004'
    env_file:
      - ./payment-service/.env
    networks:
      - medicare-network

  notification-service:
    build: ./notification-service
    container_name: medicare-notification-service
    ports:
      - '3005:3005'
    env_file:
      - ./notification-service/.env
    networks:
      - medicare-network

  doctor-service:
    build: ./doctor-service
    container_name: medicare-doctor-service
    ports:
      - '8082:8082'
    env_file:
      - ./doctor-service/.env
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - medicare-network

  telemedicine-service:
    build: ./telemedicine-service
    container_name: medicare-telemedicine-service
    ports:
      - '8085:8085'
    env_file:
      - ./telemedicine-service/.env
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - JITSI_BASE_URL=https://meet.jit.si
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - medicare-network

networks:
  medicare-network:
    driver: bridge

volumes:
  mongo-auth-data:
